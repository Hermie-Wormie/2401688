services:
  web:
    build: ./web
    container_name: web
    ports:
      - "80:8080"
      - "443:8443"
    volumes:
      - ./web/html:/usr/share/nginx/html:ro
      - ./web/.htpasswd:/etc/nginx/.htpasswd:ro
    restart: unless-stopped
    networks:
      - appnet

  gitserver:
    image: rockstorm/git-server:2.45
    container_name: gitserver
    ports:
      - "2222:22"
    volumes:
      - ./git-server/repos:/srv/git
      - ./git-server/keys:/tmp/keys:ro
      - ./git-server/setup-keys.sh:/docker-entrypoint.d/20-keys.sh:ro
    restart: unless-stopped
    networks:
      - appnet

  app:
    build: ./app
    container_name: app
    environment:
      - DB_HOST=db
      - DB_USER=appuser
      - DB_PASSWORD=2401688@SIT.singaporetech.edu.sg
      - DB_NAME=searchdb
      - FLASK_SECRET_KEY=b7f3e9d1c4a852f6e0d9b3c7a1f5e8d2
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - appnet
    ports:
      - "5000:5000"

  db:
    image: mariadb:11.4
    container_name: db
    environment:
      - MARIADB_ROOT_PASSWORD=2401688@SIT.singaporetech.edu.sg
      - MARIADB_DATABASE=searchdb
      - MARIADB_USER=appuser
      - MARIADB_PASSWORD=2401688@SIT.singaporetech.edu.sg
    volumes:
      - db-data:/var/lib/mysql
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped
    networks:
      - appnet
  
  sonarqube:
    image: sonarqube:community
    container_name: sonarqube
    ports:
      - "9000:9000"
    environment:
      - SONAR_ES_BOOTSTRAP_CHECKS_DISABLE=true
    volumes:
      - sonarqube-data:/opt/sonarqube/data
      - sonarqube-extensions:/opt/sonarqube/extensions
      - sonarqube-logs:/opt/sonarqube/logs
    restart: unless-stopped
    networks:
      - appnet

  sonarqube-init:
    image: curlimages/curl:8.10.1
    container_name: sonarqube-init
    depends_on:
      - sonarqube
    entrypoint: >
      sh -c "
      until curl -s http://sonarqube:9000/api/system/status | grep -q UP; do sleep 5; done;
      curl -s -u admin:admin -X POST 'http://sonarqube:9000/api/users/change_password?login=admin&previousPassword=admin&password=2401688%40SIT.singaporetech.edu.sg' || true"
    restart: "no"
    networks:
      - appnet

volumes:
  db-data:
  sonarqube-data:
  sonarqube-extensions:
  sonarqube-logs:

networks:
  appnet:
    driver: bridge