services:
  web:
    build: ./web
    container_name: web
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./web/html:/usr/share/nginx/html:ro
      - ./web/.htpasswd:/etc/nginx/.htpasswd:ro
      - ./web/certs:/etc/nginx/certs:ro
    restart: unless-stopped
    networks:
      - appnet
  gitserver:
    image: rockstorm/git-server:2.45
    container_name: gitserver
    ports:
      - "2222:22"
    volumes:
      - ./git-server/repos:/srv/git
      - ./git-server/keys:/tmp/keys:ro
    restart: unless-stopped
    networks:
      - appnet

networks:
  appnet:
    driver: bridge