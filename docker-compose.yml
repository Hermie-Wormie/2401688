services:
  web:
    build: ./web
    container_name: web
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./web/html:/usr/share/nginx/html:ro
      - ./web/.htpasswd:/etc/nginx/.htpasswd:ro
      - ./web/certs:/etc/nginx/certs:ro
    restart: unless-stopped
    networks:
      - appnet

  gitserver:
    image: rockstorm/git-server:2.45
    container_name: gitserver
    ports:
      - "2222:22"
    volumes:
      - ./git-server/repos:/srv/git
      - ./git-server/keys:/tmp/keys:ro
      - ./git-server/setup-keys.sh:/docker-entrypoint.d/20-keys.sh:ro
    restart: unless-stopped
    networks:
      - appnet

  app:
    build: ./app
    container_name: app
    environment:
      - DB_HOST=db
      - DB_USER=appuser
      - DB_PASSWORD=2401688@sit.singaporetech.edu.sg
      - DB_NAME=searchdb
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - appnet

  db:
    image: mariadb:11.4
    container_name: db
    environment:
      - MARIADB_ROOT_PASSWORD=2401688@sit.singaporetech.edu.sg
      - MARIADB_DATABASE=searchdb
      - MARIADB_USER=appuser
      - MARIADB_PASSWORD=2401688@sit.singaporetech.edu.sg
    volumes:
      - db-data:/var/lib/mysql
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped
    networks:
      - appnet

volumes:
  db-data:

networks:
  appnet:
    driver: bridge